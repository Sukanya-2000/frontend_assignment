<section class="features">
  <div class="features__container">
    <div class="features__header">
      <span class="features__tag">Why Olive?</span>
      <h2 class="features__title">Food intelligence<br>at your fingertips</h2>
      <p class="features__subtitle">
        Every grocery decision becomes easier, safer, and more confident with Olive by your side.
      </p>
    </div>

    <div class="features__grid">
      <div *ngFor="let feature of features; let i = index" class="feature-card">
        <div class="feature-card__icon">
          <!-- Scan icon -->
          <svg *ngIf="feature.icon === 'scan'" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2d5016" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 23 1 18 1"></polyline>
            <line x1="16" y1="8" x2="23" y2="1"></line>
            <polyline points="1 6 1 1 6 1"></polyline>
            <line x1="8" y1="8" x2="1" y2="1"></line>
            <polyline points="23 18 23 23 18 23"></polyline>
            <line x1="16" y1="16" x2="23" y2="23"></line>
            <polyline points="1 18 1 23 6 23"></polyline>
            <line x1="8" y1="16" x2="1" y2="23"></line>
          </svg>

          <!-- Shield icon -->
          <svg *ngIf="feature.icon === 'shield'" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2d5016" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>

          <!-- Family icon -->
          <svg *ngIf="feature.icon === 'family'" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2d5016" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>

          <!-- Expert icon -->
          <svg *ngIf="feature.icon === 'expert'" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2d5016" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        <h3 class="feature-card__title">{{ feature.title }}</h3>
        <p class="feature-card__desc">{{ feature.description }}</p>
      </div>
    </div>

    <!-- Trust bar -->
    <div class="features__trust-bar">
      <div class="trust-item">
        <span class="trust-number">250K+</span>
        <span class="trust-label">Products scanned</span>
      </div>
      <div class="trust-divider"></div>
      <div class="trust-item">
        <span class="trust-number">98%</span>
        <span class="trust-label">Accuracy rate</span>
      </div>
      <div class="trust-divider"></div>
      <div class="trust-item">
        <span class="trust-number">50K+</span>
        <span class="trust-label">Families protected</span>
      </div>
    </div>
  </div>
</section>
